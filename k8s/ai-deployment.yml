apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-deployment
  labels:
    name: ai-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-server

  template:
    metadata:
      labels:
        app: ai-server

    spec:
      containers:
        - name: ai-server
          image: ai-orchestration
          env:
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: MISTRAL_API_KEY

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 180
            timeoutSeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 45
            timeoutSeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          ports:
            - containerPort: 3000
              name: ai-server-port