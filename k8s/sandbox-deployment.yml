apiVersion: apps/v1
kind: Deployment

metadata:
  name: sandbox-deployment
  labels:
    name: sandbox-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sandbox-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: sandbox-api

    spec:
      serviceAccountName: resource-manager
      containers:
        - name: main-sandbox-container
          image: sandbox
          imagePullPolicy: IfNotPresent



          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10
          
          env:
            - name : REDIS_URL
              valueFrom:
                secretKeyRef:
                  name : database
                  key : REDIS_URL
 
            - name : JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name : jwt
                  key : JWT_SECRET

            - name : AUTH_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name : database
                  key : SANDBOX

          readinessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10

          ports:
            - containerPort: 3000
              name: main-sandbox