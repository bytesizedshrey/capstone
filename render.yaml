services:
  - type: web
    name: capstone-router
    env: node
    rootDir: sandbox/router
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status/healthz
    envVars:
      - fromGroup: capstone-secrets
      - key: AUTH_SERVICE_URL
        value: https://capstone-auth.onrender.com
      - key: SANDBOX_SERVICE_URL
        value: https://capstone-sandbox-api.onrender.com
      - key: AI_SERVICE_URL
        value: https://capstone-ai.onrender.com

  - type: web
    name: capstone-auth
    env: node
    rootDir: auth
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /_status/healthz
    envVars:
      - fromGroup: capstone-secrets

  - type: web
    name: capstone-sandbox-api
    env: node
    rootDir: sandbox/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/sandbox/health
    envVars:
      - fromGroup: capstone-secrets
      - key: TEMPLATE_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: AGENT_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: SYNC_AGENT_IMAGE_PULL_POLICY
        value: IfNotPresent

  - type: web
    name: capstone-ai
    env: node
    rootDir: ai-orchestration
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status/healthz
    envVars:
      - fromGroup: capstone-secrets

  - type: web
    name: capstone-notification
    env: node
    rootDir: notification
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /_status/healthz
    envVars:
      - fromGroup: capstone-secrets

envVarGroups:
  - name: capstone-secrets
    envVars:
      - key: REDIS_URL
      - key: AUTH_MONGO_URI
      - key: RABBITMQ_URL
      - key: JWT_SECRET
      - key: GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
      - key: GOOGLE_CALLBACK_URL
      - key: FRONTEND_URL
      - key: COOKIE_DOMAIN
      - key: KUBECONFIG_BASE64
      - key: SANDBOX_DOMAIN
      - key: TEMPLATE_IMAGE
      - key: AGENT_IMAGE
      - key: SYNC_AGENT_IMAGE
      - key: MISTRAL_API_KEY
      - key: EMAIL_USER
      - key: GOOGLE_REFRESH_TOKEN
