services:
  - type: web
    name: capstone-router
    env: node
    rootDir: sandbox/router
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status/healthz
    envVars:
      - fromGroup: capstone-secrets
      - key: AUTH_SERVICE_URL
        value: https://capstone-auth.onrender.com
      - key: SANDBOX_SERVICE_URL
        value: https://capstone-sandbox-api.onrender.com
      - key: AI_SERVICE_URL
        value: https://capstone-ai.onrender.com

  - type: web
    name: capstone-auth
    env: node
    rootDir: auth
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /_status/healthz
    envVars:
      - fromGroup: capstone-secrets

  - type: web
    name: capstone-sandbox-api
    env: node
    rootDir: sandbox/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/sandbox/health
    envVars:
      - fromGroup: capstone-secrets
      - key: TEMPLATE_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: AGENT_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: SYNC_AGENT_IMAGE_PULL_POLICY
        value: IfNotPresent

  - type: web
    name: capstone-ai
    env: node
    rootDir: ai-orchestration
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status/healthz
    envVars:
      - fromGroup: capstone-secrets

  - type: web
    name: capstone-notification
    env: node
    rootDir: notification
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /_status/healthz
    envVars:
      - fromGroup: capstone-secrets

envVarGroups:
  - name: capstone-secrets
    envVars:
      - key: REDIS_URL
        value: "redis://default:password@host:port"
      - key: AUTH_MONGO_URI
        value: "mongodb+srv://user:password@cluster"
      - key: RABBITMQ_URL
        value: "amqps://user:password@host/vhost"
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: "your-google-client-id"
      - key: GOOGLE_CLIENT_SECRET
        value: "your-google-client-secret"
      - key: GOOGLE_CALLBACK_URL
        value: "https://capstone-auth.onrender.com/api/auth/google/callback"
      - key: FRONTEND_URL
        value: "https://your-app.vercel.app"
      - key: COOKIE_DOMAIN
        value: ""
      - key: KUBECONFIG_BASE64
        value: "base64-encoded-kubeconfig"
      - key: SANDBOX_DOMAIN
        value: "yourdomain.com"
      - key: TEMPLATE_IMAGE
        value: "template:latest"
      - key: AGENT_IMAGE
        value: "agent:latest"
      - key: SYNC_AGENT_IMAGE
        value: "sync-agent"
      - key: MISTRAL_API_KEY
        value: "your-mistral-api-key"
      - key: EMAIL_USER
        value: "your-email@gmail.com"
      - key: GOOGLE_REFRESH_TOKEN
        value: "your-google-refresh-token"
